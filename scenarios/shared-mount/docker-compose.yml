services:
  shared-mount:
    build:
      context: ../../base
    image: container-risk-labs-toolbox:local
    container_name: crl-shared-mount
    command: ["sleep", "infinity"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - type: bind
        source: /tmp/container-risk-labs/shared-mount/shared-bind
        target: /lab/shared-mount
        bind:
          propagation: shared
    labels:
      container-risk-labs.repo: "container-risk-labs"
      container-risk-labs.scenario: "shared-mount"
      container-risk-labs.intent: "shared-propagation-visible-in-mountinfo"

