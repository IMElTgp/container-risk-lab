services:
  baseline:
    build:
      context: ../../base
    image: container-risk-labs-toolbox:local
    container_name: crl-baseline
    command: ["sleep", "infinity"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      container-risk-labs.repo: "container-risk-labs"
      container-risk-labs.scenario: "baseline"
      container-risk-labs.intent: "low-risk-control"

