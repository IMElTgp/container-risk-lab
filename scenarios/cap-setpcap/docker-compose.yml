services:
  cap-setpcap:
    build:
      context: ../../base
    image: container-risk-labs-toolbox:local
    container_name: crl-cap-setpcap
    command:
      - sh
      - -lc
      - cp /lab/helper/setpcap_probe /tmp/setpcap_probe && chmod +x /tmp/setpcap_probe && exec sleep infinity
    cap_drop:
      - ALL
    cap_add:
      - SETPCAP
      - NET_RAW
    security_opt:
      - no-new-privileges:true
      - label=disable
    volumes:
      - type: bind
        source: /tmp/container-risk-labs/cap-setpcap
        target: /lab/helper
        read_only: true
    labels:
      container-risk-labs.repo: "container-risk-labs"
      container-risk-labs.scenario: "cap-setpcap"
      container-risk-labs.intent: "single-rule-cap-setpcap"
