services:
  cap-sys-module:
    build:
      context: ../../base
    image: container-risk-labs-toolbox:local
    container_name: crl-cap-sys-module
    command: ["sleep", "infinity"]
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - /tmp/container-risk-labs/cap-sys-module:/labhelpers:ro
    cap_drop:
      - ALL
    cap_add:
      - SYS_MODULE
    security_opt:
      - no-new-privileges:true
      - label=disable
    labels:
      container-risk-labs.repo: "container-risk-labs"
      container-risk-labs.scenario: "cap-sys-module"
      container-risk-labs.intent: "single-rule-cap-sys-module"
