services:
  seccomp-unconfined-cap-mknod:
    build:
      context: ../../base
    image: container-risk-labs-toolbox:local
    container_name: crl-seccomp-unconfined-cap-mknod
    command: ["sleep", "infinity"]
    cap_drop:
      - ALL
    cap_add:
      - MKNOD
    security_opt:
      - no-new-privileges:true
      - seccomp=unconfined
    labels:
      container-risk-labs.repo: "container-risk-labs"
      container-risk-labs.scenario: "seccomp-unconfined-cap-mknod"
      container-risk-labs.intent: "composition-unconfined-seccomp-plus-cap-mknod"

