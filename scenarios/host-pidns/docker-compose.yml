services:
  host-pidns:
    build:
      context: ../../base
    image: container-risk-labs-toolbox:local
    container_name: crl-host-pidns
    command: ["sleep", "infinity"]
    pid: "host"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      container-risk-labs.repo: "container-risk-labs"
      container-risk-labs.scenario: "host-pidns"
      container-risk-labs.intent: "pid-namespace-host-sharing"

