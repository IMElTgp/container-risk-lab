services:
  cap-sys-resource:
    build:
      context: ../../base
    image: container-risk-labs-toolbox:local
    container_name: crl-cap-sys-resource
    command: ["sleep", "infinity"]
    cap_drop:
      - ALL
    cap_add:
      - SYS_RESOURCE
    security_opt:
      - no-new-privileges:true
      - label=disable
    labels:
      container-risk-labs.repo: "container-risk-labs"
      container-risk-labs.scenario: "cap-sys-resource"
      container-risk-labs.intent: "single-rule-cap-sys-resource"
